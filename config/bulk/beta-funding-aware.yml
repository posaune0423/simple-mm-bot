mode: live
venue: bulk

connections:
  bulk:
    wsUrl: wss://exchange-ws1.bulk.trade
    httpUrl: https://exchange-api.bulk.trade/api/v1
    market: BTC-USD
    environment: beta
    nlevels: 20
    timeoutMs: 30000
    maxLeverage: 50
    marketWsReconnectAfterMs: 5000

quoteEngine:
  markWeight: 0.25
  bookPriceSource: micro
  inventoryScale: 0.22
  timeHorizonSec: 10
  minSpreadBps: 4.0
  slideMarginThreshold: 0.06
  defaultTimeInForce: ALO
  sizing:
    positionSize: 1.0
    budgetUsd: 45000
    bidDistanceMultiplier: 1.25
    askSizeMultiplier: 0.45
  levels:
    - halfSpreadBps: 4.0
      sizeUsd: 15000
    - halfSpreadBps: 6.4
      sizeUsd: 15000
    - halfSpreadBps: 9.6
      sizeUsd: 15000
  qualityGate:
    enabled: true
    minAverageMarkoutBps: 0
    minSamples: 20
    lookbackFills: 100
    maxFillAgeMs: 900000
    horizonsSec: [5, 30, 300]
  strategy:
    type: funding-aware
    params:
      gamma: 0
      kappa: 625
      kInv: 2
      alpha:
        enabled: false
        source: none
        chainSlug: testnet
        asset: BTC
        timeframe: 5m
        pollIntervalMs: 60000
        staleMs: 420000
        calibrationWeight: 0.04
        minAlphaDriftBps: 0.25
        maxAlphaDriftBps: 3.0
        maxRawDriftBps: 200
        maxCiWidthBps: 250
      targetInventory:
        maxQty: 0.35
        alphaQtyPerBps: 0.025
      funding:
        rateHorizonSec: 3600
        holdingHorizonSec: 300
        spreadWideningBpsPerAbsFundingBps: 0.1

risk:
  imrBuffer: 0.06
  mmrBuffer: 0.03
  maxBookAgeMs: 2500
  maxTickerAgeMs: 2500
  maxPositionQty: 1.25
  reduceTriggerQty: 1.05
  reduceTargetQty: 0.25
  maxUnrealizedLossUsd: 650
  maxAdverseMoveBps: 220

bot:
  intervalMs: 150
  maxRestingMs: 3000

shutdown:
  closePositionPolicy: always

paper:
  touchFillRatio: 1

backtest:
  market: BTC-USD
  timeframe: 1m
  from: 2026-05-08T18:17:03.708Z
  to: 2026-05-09T18:17:03.708Z
