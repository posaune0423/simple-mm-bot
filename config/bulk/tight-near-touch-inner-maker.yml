# Bulk beta inner-level maker-quality tight-spread canary.
# Hypothesis: in tight spread, the inner near-touch level has better short-term
# selection than wider/stale levels. Keep only level 0 and a smaller inventory
# cap to reduce order churn before the next live maker-quality probe.
mode: live
venue: bulk

connections:
  bulk:
    wsUrl: wss://exchange-ws1.bulk.trade
    httpUrl: https://exchange-api.bulk.trade/api/v1
    market: BTC-USD
    environment: beta
    nlevels: 20
    timeoutMs: 30000
    maxLeverage: 50
    marketWsReconnectAfterMs: 5000

quoteEngine:
  markWeight: 0.25
  bookPriceSource: micro
  inventoryScale: 0.02
  timeHorizonSec: 3
  minSpreadBps: 2.0
  slideMarginThreshold: 0.02
  defaultTimeInForce: ALO
  sizing:
    positionSize: 0.03
    budgetUsd: 1500
    bidDistanceMultiplier: 1.15
    askSizeMultiplier: 0.35
  levels:
    - halfSpreadBps: 1.5
      sizeUsd: 750
  qualityGate:
    enabled: true
    minAverageMarkoutBps: 0
    minSamples: 8
    lookbackFills: 40
    maxFillAgeMs: 600000
    horizonsSec: [5, 30, 300]
  strategy:
    type: avellaneda-stoikov
    params:
      gamma: 0
      kappa: 625
      kInv: 2

risk:
  imrBuffer: 0.06
  mmrBuffer: 0.03
  maxBookAgeMs: 2500
  maxTickerAgeMs: 2500
  maxPositionQty: 0.05
  reduceTriggerQty: 0.035
  reduceTargetQty: 0.008
  maxUnrealizedLossUsd: 20
  maxAdverseMoveBps: 45

bot:
  intervalMs: 150
  maxRestingMs: 700
  exchangeOpenOrderSyncIntervalMs: 1500

shutdown:
  closePositionPolicy: emergency_only

paper:
  touchFillRatio: 1

backtest:
  market: BTC-USD
  timeframe: 1m
  from: 2026-05-12T10:13:41.000Z
  to: 2026-05-12T12:38:01.000Z
