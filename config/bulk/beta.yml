# Bulk beta status:
# - Faucet deposits 10,000 mock USD once per 24 hours per account.
# - This preset is a tight-spread canary baseline for the current BTC-USD beta
#   regime. Do not scale notional solely for leaderboard volume unless live PnL
#   and 5s/30s/300s markouts pass.
# - Bulk exchangeInfo may omit ALO from timeInForces, but the order endpoint
#   accepts tif=ALO as post-only; keep quotes ALO to avoid accidental taker fills.
# - Use this for virtual trading only, not for real-capital mainnet.
mode: live
venue: bulk

connections:
  bulk:
    wsUrl: wss://exchange-ws1.bulk.trade
    httpUrl: https://exchange-api.bulk.trade/api/v1
    market: BTC-USD
    environment: beta
    nlevels: 20
    # Give Bulk beta private endpoints more room during busy windows. The
    # exchange may still return server-side 408s before this client timeout.
    timeoutMs: 30000
    # Bulk beta mock account currently reports 50x leverage. Position/risk caps
    # remain bot-side; this avoids fail-closed startup during volume canaries.
    maxLeverage: 50
    # Reconnect when quote-critical WS streams stop delivering messages.
    # Book state is seeded from REST and then maintained from l2Snapshot.
    marketWsReconnectAfterMs: 5000
    # Bulk account fills are still polled until the account WS path is wired.
    # Keep this conservative because Bulk does not publish account.fills limits.
    fillPollIntervalMs: 2000

quoteEngine:
  markWeight: 0.25
  # Controlled live A/B on 2026-05-10 showed depth VAMP was worse than micro
  # for current Bulk BTC-USD flow; keep this config-switchable, but default to
  # micro until VAMP has positive live bucket evidence.
  bookPriceSource: micro
  inventoryScale: 0.025
  timeHorizonSec: 3
  minSpreadBps: 1.6
  slideMarginThreshold: 0.02
  defaultTimeInForce: ALO
  sizing:
    positionSize: 0.02
    # 2026-05-15 live diagnosis: BTC-USD beta was trading around <0.25 bps
    # market spread while the previous beta level 0 sat ~4-5 bps from best and
    # repeatedly produced zero fills. Keep this small until live markout passes.
    budgetUsd: 1000
    bidDistanceMultiplier: 1.2
    askDistanceMultiplier: 0.9
    askSizeMultiplier: 1.0
    # Treat single-fill dust as flat for passive reduce quoting; shutdown still
    # force-closes residual inventory.
    reduceQuoteMinPositionQty: 0.0065
  levels:
    - halfSpreadBps: 0.8
      sizeUsd: 1000
  qualityGate:
    enabled: true
    minAverageMarkoutBps: 0
    minSamples: 8
    lookbackFills: 40
    maxFillAgeMs: 600000
    horizonsSec: [5, 30, 300]
  externalFair:
    enabled: false
    mode: replace_local
    maxAgeMs: 500
    minSourceCount: 2
    maxSpreadBps: 10
    maxDeviationBps: 20
    sources:
      - venue: binance_usdm
        symbol: BTCUSDT
        weight: 0.5
        wsUrl: wss://fstream.binance.com
        channel: bookTicker
        reconnectDelayMs: 1000
      - venue: okx_swap
        symbol: BTC-USDT-SWAP
        weight: 0.3
        wsUrl: wss://ws.okx.com:8443/ws/v5/public
        channel: bbo-tbt
        reconnectDelayMs: 1000
      - venue: bybit_linear
        symbol: BTCUSDT
        weight: 0.2
        wsUrl: wss://stream.bybit.com/v5/public/linear
        channel: orderbook.1
        reconnectDelayMs: 1000
  strategy:
    type: avellaneda-stoikov
    params:
      gamma: 0
      kappa: 625
      kInv: 2

risk:
  imrBuffer: 0.06
  mmrBuffer: 0.03
  # l2Snapshot frames can occasionally gap above 2s on Bulk beta.
  maxBookAgeMs: 2500
  # Ticker is quote-critical but can lag the initial snapshot by ~1.8s at startup.
  maxTickerAgeMs: 2500
  maxPositionQty: 0.025
  reduceTriggerQty: 0.012
  reduceTargetQty: 0.003
  maxUnrealizedLossUsd: 15
  maxAdverseMoveBps: 35

bot:
  intervalMs: 150
  maxRestingMs: 700
  exchangeOpenOrderSyncIntervalMs: 1500
  # Keep quote placement on the hot path; accepted cancels are scrubbed by the
  # periodic exchange-open-order sync instead of a blocking post-cancel sync.
  postCancelOpenOrderSyncMode: interval

shutdown:
  closePositionPolicy: always

paper:
  touchFillRatio: 1

backtest:
  market: BTC-USD
  timeframe: 1m
  from: 2026-05-12T10:13:41.000Z
  to: 2026-05-12T12:38:01.000Z
