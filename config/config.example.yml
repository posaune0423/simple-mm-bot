mode: paper
venue: hyperliquid

connections:
  hyperliquid:
    wsUrl: ${HL_WS_URL}
    httpUrl: ${HL_HTTP_URL}
    market: ETH
    secretKey: ${HL_SECRET_KEY}
    accountAddress: ${HL_ACCOUNT_ADDRESS}

quoteEngine:
  markWeight: 0.6
  inventoryScale: 0.05
  timeHorizonSec: 30
  slideMarginThreshold: 0.12
  defaultTimeInForce: ALO
  strategy:
    type: avellaneda-stoikov
    params:
      gamma: 0.02
      kappa: 1.5
      kInv: 0.3
      baseSize: 0.01

risk:
  imrBuffer: 0.15
  mmrBuffer: 0.08
  maxPositionQty: 0.05

bot:
  intervalMs: 500

paper:
  touchFillRatio: 0.5

backtest:
  market: ETH
  timeframe: 1h
  from: "2024-01-01"
  to: "2024-01-07"
