mode: backtest
venue: hyperliquid

connections:
  hyperliquid:
    wsUrl: wss://api.hyperliquid.xyz/ws
    httpUrl: https://api.hyperliquid.xyz
    market: ETH

quoteEngine:
  markWeight: 0.6
  inventoryScale: 0.05
  timeHorizonSec: 30
  slideMarginThreshold: 0.12
  defaultTimeInForce: ALO
  strategy:
    type: avellaneda-stoikov
    params:
      gamma: 0.02
      kappa: 1.5
      kInv: 0.3
      baseSize: 0.01

risk:
  imrBuffer: 0.15
  mmrBuffer: 0.08
  maxPositionQty: 0.05

bot:
  intervalMs: 10

paper:
  touchFillRatio: 0.75

backtest:
  market: ETH
  timeframe: 1h
  from: "2024-01-01"
  to: "2024-01-07"
