mode: backtest
venue: bulk

connections:
  bulk:
    wsUrl: wss://exchange-ws1.bulk.trade
    httpUrl: https://exchange-api.bulk.trade/api/v1
    market: BTC-USD
    environment: beta
    nlevels: 20

quoteEngine:
  markWeight: 1
  inventoryScale: 0.2
  timeHorizonSec: 10
  minSpreadBps: 2
  slideMarginThreshold: 0.06
  defaultTimeInForce: ALO
  sizing:
    positionSize: 1.25
    budgetUsd: 50000
  levels:
    - halfSpreadBps: 1
      sizeUsd: 9400
    - halfSpreadBps: 2
      sizeUsd: 18800
    - halfSpreadBps: 4
      sizeUsd: 31300
    - halfSpreadBps: 8
      sizeUsd: 50000
  strategy:
    type: avellaneda-stoikov
    params:
      gamma: 0
      kappa: 625
      kInv: 2

risk:
  imrBuffer: 0.06
  mmrBuffer: 0.03
  maxPositionQty: 0.85

bot:
  intervalMs: 1

paper:
  touchFillRatio: 1

backtest:
  market: BTC-USD
  timeframe: 1m
  from: "2026-05-06"
  to: "2026-05-07"
