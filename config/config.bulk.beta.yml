# Bulk beta status:
# - Faucet deposits 10,000 mock USD once per 24 hours per account.
# - This preset is a PnL-first guarded baseline. Do not scale notional solely
#   for leaderboard volume unless live PnL and 5s/30s/300s markouts pass.
# - Bulk exchangeInfo may omit ALO from timeInForces, but the order endpoint
#   accepts tif=ALO as post-only; keep quotes ALO to avoid accidental taker fills.
# - Use this for virtual trading only, not for real-capital mainnet.
mode: live
venue: bulk

connections:
  bulk:
    wsUrl: wss://exchange-ws1.bulk.trade
    httpUrl: https://exchange-api.bulk.trade/api/v1
    market: BTC-USD
    environment: beta
    nlevels: 20
    # Give Bulk beta private endpoints more room during busy windows. The
    # exchange may still return server-side 408s before this client timeout.
    timeoutMs: 30000
    # Bulk beta mock account currently reports 50x leverage. Position/risk caps
    # remain bot-side; this avoids fail-closed startup during volume canaries.
    maxLeverage: 50
    # Reconnect when quote-critical WS streams stop delivering messages.
    # Book state is seeded from REST and then maintained from l2Delta.
    marketWsReconnectAfterMs: 5000

quoteEngine:
  markWeight: 0.25
  # Controlled live A/B on 2026-05-10 showed depth VAMP was worse than micro
  # for current Bulk BTC-USD flow; keep this config-switchable, but default to
  # micro until VAMP has positive live bucket evidence.
  bookPriceSource: micro
  inventoryScale: 0.22
  timeHorizonSec: 10
  minSpreadBps: 4.0
  slideMarginThreshold: 0.06
  defaultTimeInForce: ALO
  sizing:
    positionSize: 1.0
    # 2026-05-11 live loop: keep 1.25 as the default. Tightening bid distance
    # to 1.10 improved reduce-buy markout but reduced aggregate EV/300s, and
    # adding askDistance 1.20 still left high reduce churn.
    # Stage13 askSize 0.45 improved live EV/300s and inventory versus baseline,
    # while preserving enough projected volume for phase1/rebate targets.
    budgetUsd: 45000
    bidDistanceMultiplier: 1.25
    askSizeMultiplier: 0.45
  levels:
    - halfSpreadBps: 4.0
      sizeUsd: 15000
    - halfSpreadBps: 6.4
      sizeUsd: 15000
    - halfSpreadBps: 9.6
      sizeUsd: 15000
  qualityGate:
    enabled: true
    minAverageMarkoutBps: 0
    minSamples: 20
    lookbackFills: 100
    maxFillAgeMs: 900000
    horizonsSec: [5, 30, 300]
  strategy:
    type: avellaneda-stoikov
    params:
      gamma: 0
      kappa: 625
      kInv: 2

risk:
  imrBuffer: 0.06
  mmrBuffer: 0.03
  # Bulk beta book updates often arrive just over the old 750ms hard gate.
  # Keep this close to 750ms while avoiding cancel churn from normal feed cadence.
  maxBookAgeMs: 1100
  maxPositionQty: 1.25
  reduceTriggerQty: 1.05
  reduceTargetQty: 0.25
  maxUnrealizedLossUsd: 650
  maxAdverseMoveBps: 220

bot:
  intervalMs: 150
  maxRestingMs: 3000

shutdown:
  closePositionPolicy: always

paper:
  touchFillRatio: 1

backtest:
  market: BTC-USD
  timeframe: 1m
  from: 2026-05-08T18:17:03.708Z
  to: 2026-05-09T18:17:03.708Z
