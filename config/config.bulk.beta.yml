# Bulk beta status:
# - Faucet deposits 10,000 mock USD once per 24 hours per account.
# - This preset uses passive GTC ladder quotes for leaderboard-oriented
#   turnover while keeping inventory bounded. Bulk beta BTC-USD currently
#   exposes GTC/IOC time in force, not ALO/post-only.
# - Use this for virtual trading only, not for real-capital mainnet.
mode: live
venue: bulk

connections:
  bulk:
    wsUrl: wss://exchange-ws1.bulk.trade
    httpUrl: https://exchange-api.bulk.trade/api/v1
    market: BTC-USD
    environment: beta
    nlevels: 20
    # Bulk accounts may default to 50x. The bot verifies the account setting
    # before live orders and fails closed if the UI/API leverage is higher.
    maxLeverage: 10

quoteEngine:
  markWeight: 0.25
  inventoryScale: 0.08
  timeHorizonSec: 10
  minSpreadBps: 3
  slideMarginThreshold: 0.06
  defaultTimeInForce: GTC
  sizing:
    positionSize: 1.25
    budgetUsd: 14400
  levels:
    - halfSpreadBps: 1.5
      sizeUsd: 14400
  strategy:
    type: bulk-beta-leaderboard
    params:
      baseHalfSpreadBps: 2.5
      minHalfSpreadBps: 1.2
      maxHalfSpreadBps: 8
      volatilitySpreadMultiplier: 1.5
      inventorySoftLimitQty: 0.08
      inventoryHardLimitQty: 0.18
      sameSideSizeMultiplierAtSoft: 0.25
      reduceSideSizeMultiplierAtSoft: 1.8

risk:
  imrBuffer: 0.06
  mmrBuffer: 0.03
  maxPositionQty: 0.22
  reduceTriggerQty: 0.18
  reduceTargetQty: 0.08
  maxUnrealizedLossUsd: 25
  maxAdverseMoveBps: 20

bot:
  intervalMs: 1000

shutdown:
  closePositionPolicy: emergency_only

paper:
  touchFillRatio: 1

backtest:
  market: BTC-USD
  timeframe: 1m
  from: "2026-05-06"
  to: "2026-05-07"
