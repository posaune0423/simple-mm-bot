# Bulk beta status:
# - The leaderboard is public during the beta.
# - Operators can claim 10,000 mock USD once per day.
# - Use this period to make paper trading profitable before mainnet launch.
mode: paper
venue: bulk

connections:
  bulk:
    wsUrl: wss://exchange-ws1.bulk.trade
    httpUrl: https://exchange-api.bulk.trade/api/v1
    market: BTC-USD
    environment: beta
    nlevels: 20
    # Bulk accounts may default to 50x. The bot verifies the account setting
    # before live orders and fails closed if the UI/API leverage is higher.
    maxLeverage: 5

quoteEngine:
  markWeight: 0.5
  inventoryScale: 0.5
  timeHorizonSec: 10
  minSpreadBps: 5.6
  slideMarginThreshold: 0.08
  defaultTimeInForce: ALO
  sizing:
    positionSize: 0.05
    budgetUsd: 250
  strategy:
    type: avellaneda-stoikov
    params:
      gamma: 0
      kappa: 8
      kInv: 0.05

risk:
  imrBuffer: 0.08
  mmrBuffer: 0.04
  maxPositionQty: 0.5
  # Keep paper canaries aligned with live Bulk beta snapshot freshness.
  maxBookAgeMs: 2500
  maxTickerAgeMs: 2500

bot:
  intervalMs: 250

paper:
  touchFillRatio: 1

backtest:
  market: BTC-USD
  timeframe: 1m
  from: "2026-05-06"
  to: "2026-05-07"
