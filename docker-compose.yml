services:
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: simple-mm-local-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: mm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mm}
      POSTGRES_DB: mm_bot
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/timescaledb:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mm -d mm_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  market-data-recorder-bulk:
    platform: linux/amd64
    image: simple-mm-bot:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simple-mm-local-recorder-bulk
    restart: unless-stopped
    profiles:
      - worker
    depends_on:
      timescaledb:
        condition: service_healthy
    volumes:
      - ./infra/hetzner/configs:/app/configs:ro
      - ./logs:/app/logs
    environment:
      DATABASE_URL: postgresql://mm:${POSTGRES_PASSWORD:-mm}@timescaledb:5432/mm_bot
      RECORDER_CONFIG_PATH: /app/configs/worker.bulk.btc.yml
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: ["bun", "run", "record:market-data"]

  external-market-recorder:
    platform: linux/amd64
    image: simple-mm-bot:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simple-mm-local-external-recorder
    restart: unless-stopped
    profiles:
      - worker
    depends_on:
      timescaledb:
        condition: service_healthy
    volumes:
      - ./infra/hetzner/configs:/app/configs:ro
      - ./logs:/app/logs
    environment:
      DATABASE_URL: postgresql://mm:${POSTGRES_PASSWORD:-mm}@timescaledb:5432/mm_bot
      EXTERNAL_MARKET_RECORDER_CONFIG_PATH: /app/configs/worker.external.btc.yml
      BINANCE_USDM_API_KEY: ${BINANCE_USDM_API_KEY:-}
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      OKX_API_KEY: ${OKX_API_KEY:-}
      BYBIT_API_KEY: ${BYBIT_API_KEY:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: ["bun", "run", "record:external-market"]

  mmbot-main:
    platform: linux/amd64
    image: simple-mm-bot:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simple-mm-local-main
    restart: unless-stopped
    profiles:
      - bot
    depends_on:
      timescaledb:
        condition: service_healthy
    volumes:
      - ./infra/hetzner/configs:/app/configs:ro
      - ./logs:/app/logs
    environment:
      CONFIG_PATH: /app/configs/bot.main.yml
      MODE: ${MODE:-paper}
      DATABASE_URL: postgresql://mm:${POSTGRES_PASSWORD:-mm}@timescaledb:5432/mm_bot
      BULK_PRIVATE_KEY: ${BULK_PRIVATE_KEY:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: ["bun", "run", "src/main.ts"]

  mmbot-canary:
    platform: linux/amd64
    image: simple-mm-bot:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simple-mm-local-canary
    restart: "no"
    profiles:
      - canary
    depends_on:
      timescaledb:
        condition: service_healthy
    volumes:
      - ./infra/hetzner/configs:/app/configs:ro
      - ./logs:/app/logs
    environment:
      CONFIG_PATH: /app/configs/bot.canary.yml
      MODE: ${MODE:-paper}
      DATABASE_URL: postgresql://mm:${POSTGRES_PASSWORD:-mm}@timescaledb:5432/mm_bot
      BULK_PRIVATE_KEY: ${BULK_CANARY_PRIVATE_KEY:-${BULK_PRIVATE_KEY:-}}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: ["bun", "run", "src/main.ts"]
