services:
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: simple-mm-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: mm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mm_bot
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/timescaledb:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mm -d mm_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  market-data-recorder-bulk:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simple-mm-recorder-bulk
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mm:${POSTGRES_PASSWORD}@timescaledb:5432/mm_bot
      RECORDER_VENUE: bulk
      RECORDER_SYMBOL: BTC-USD
      RECORDER_DEPTH: 10
      BULK_HTTP_URL: ${BULK_HTTP_URL}
      BULK_WS_URL: ${BULK_WS_URL}
      RECORDER_FLUSH_INTERVAL_MS: 250
      RECORDER_MAX_BATCH_SIZE: 1000
    command: ["bun", "run", "record:market-data"]
