name: Network Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backtest-paper-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      # These tests call public Hyperliquid endpoints, so they stay out of the
      # default PR pipeline and run only on demand or on a schedule.
      - name: Run Backtest And Paper Smoke Tests
        run: bun run test:e2e:paper
