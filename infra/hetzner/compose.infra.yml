services:
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: mmbot-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: mm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: mm_bot
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/timescaledb:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mm -d mm_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
